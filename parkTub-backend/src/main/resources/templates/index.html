<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Página de Estacionamento</title>

    <!-- Estilos embutidos -->
    <style>
        /* Estilo do corpo da página */
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            height: 100vh;
        }

        /* Estilo da parte superior */
        .top-section {
            background-color: #4CAF50;
            color: white;
            padding: 20px;
            height: 25%; /* 1/4 da altura da tela */
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        .top-section h1 {
            margin: 0;
        }

        .top-section p {
            font-size: 16px;
            margin: 5px 0;
        }

        /* Estilo da parte inferior */
        .bottom-section {
            flex-grow: 1; /* Ocupa o espaço restante */
            background-color: #f4f4f4;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* Estilo do mapa */
        .map {
            width: 100%;
            height: 100%;
            background-color: #e0e0e0; /* Cor de fundo para o mapa */
            border: 1px solid #ccc;
        }

        /* Responsividade para telas menores */
        @media (max-width: 600px) {
            .top-section {
                padding: 15px;
                height: 30%; /* Aumenta a altura da parte superior em telas pequenas */
            }

            .top-section h1 {
                font-size: 20px;
            }

            .top-section p {
                font-size: 14px;
            }

            .bottom-section {
                padding: 10px;
            }
        }
    </style>
</head>
<body>
<div class="top-section">
    <h1>Locais para Estacionamento</h1>
    <p>Local: Rua do Parque</p>
    <p>Vagas Disponíveis: 5</p>
    <p>Endereço: Rua do Parque, nº 123</p>
</div>

<div class="bottom-section">
    <div class="map">
        <!-- Aqui você poderá inserir o mapa quando integrar com o Google Maps API -->
        <p>Mapa será exibido aqui</p>
    </div>
</div>
</body>
</html>
